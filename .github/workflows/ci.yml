name: Production Docker CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

permissions:
  packages: write
  contents: read

jobs:
  # 🟢 Job 1: บิวด์แอปพลิเคชันเป็น Container Image แล้วเก็บไว้บนคลาวด์
  build-and-push-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/danucharp-creator/cicd-app:latest

  # 🟢 Job 2: สั่งเดพิวลอยล์ตรงลงคอมบ้านผ่าน Docker Compose
  deploy-to-home-server:
    needs: build-and-push-image
    runs-on: self-hosted

    steps:
      - name: Checkout docker-compose file only
        uses: actions/checkout@v4

      # สั่งรันแอปพลิเคชันผ่าน Docker Compose ในเครื่องคอมของคุณ
      - name: Run Application via Docker Compose
        run: |
          echo "========================================="
          echo "🐋 เริ่มต้นกระบวนการอัปเดตระบบด้วย Docker"
          echo "========================================="
          
          # ใช้ Token ล็อกอินคลังเก็บของโดยใช้สิทธิ์ sudo ผ่านท่อสแตนด์บาย
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # ดึงและอัปเดต Container ด้วยพลังของ sudo เพื่อป้องกันเรื่อง Permission Denied
          sudo docker compose pull
          sudo docker compose up -d --build
          
          # เคลียร์ Image ขยะเก่าๆ ออกจากเครื่องทันที
          sudo docker image prune -f
          
          echo "🟢 เดพิวลอยล์แอปด้วย Container ผ่านฉลุยแล้วครับ!"